    paths: ['*--sample-projects/**']

jobs:
  test-sample-projects:
    uses: doplaydo/pdk-ci-workflow/.github/workflows/test-sample-projects.yml@main
    secrets:
      GFP_API_KEY: ${{ secrets.GFP_API_KEY }}
